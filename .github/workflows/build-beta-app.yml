name: Build Beta App

on:
  workflow_dispatch:

jobs:
  build-beta-app:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show active developer directory
        run: xcode-select -p

      - name: Build beta app bundle
        run: ./Tools/release/build-beta-app.sh

      - name: Upload beta app archive
        uses: actions/upload-artifact@v6
        with:
          name: google-drive-icon-guard-beta-unsigned
          path: dist/google-drive-icon-guard-beta-unsigned.zip
