name: Swift Package CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  swift-package:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show active developer directory
        run: xcode-select -p

      - name: Show Swift version
        run: swift --version

      - name: Build package
        run: swift build

      - name: Run tests
        run: swift test
